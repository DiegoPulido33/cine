<footer class="site-footer">
  <div class="site-footer__brand">
    <img
      src="/logos/cinesDPR.png"
      alt="Cines DPR"
      class="site-footer__logo"
    />

    <div class="site-footer__text">
      <strong>{{ t().footer.tagline }}</strong>
    </div>
  </div>

  <nav class="site-footer__nav">
    <a routerLink="/about">{{ t().footer.about }}</a>
    <a routerLink="/contact">{{ t().footer.contact }}</a>
    <a routerLink="/privacy-policy">{{ t().footer.privacy }}</a>
    <a routerLink="/terms">{{ t().footer.terms }}</a>
  </nav>
</footer>
