<header class="site-header">
  <div class="site-header__brand">
    <a routerLink="/inicio" class="site-header__logo-link">
      <img src="/logos/cinesDPR.png" alt="Cines DPR" class="site-header__logo" />
    </a>
  </div>

  <nav class="site-header__menu">
    <a
      *ngFor="let item of opciones"
      [routerLink]="item.ruta"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.ruta === '/inicio' }"
      class="menu-item"
    >
      {{ item.texto }}
    </a>
  </nav>
</header>
