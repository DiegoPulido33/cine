<section class="series-page">
  <h1 class="page-title">{{ t().seriesPage.title }}</h1>

  <div class="series-grid">
    <div
      *ngFor="let serie of series"
      class="series-card flip-card"
      (click)="toggleFlip($event)"
    >
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img
            [src]="serie.imagen"
            [alt]="getLocalizedText(serie.titulo)"
            class="poster"
          />
        </div>

        <div class="flip-card-back">
          <div class="series-info">
            <h2 class="series-title" [innerHTML]="getLocalizedText(serie.titulo)"></h2>

            <p><strong>{{ t().seriesDetail.seasons }}:</strong> {{ serie.temporadas }}</p>
            <p><strong>{{ t().seriesDetail.platform }}:</strong> {{ getLocalizedText(serie.plataforma) }}</p>

            <p class="synopsis">
              {{ getLocalizedText(serie.sinopsis) }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
