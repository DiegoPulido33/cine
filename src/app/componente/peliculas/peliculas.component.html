<section class="movies-page">
  <h1 class="page-title">{{ t().moviesPage.title }}</h1>

  <div class="movies-grid">
    <div
      *ngFor="let pelicula of peliculas"
      class="movie-card flip-card"
      (click)="toggleFlip($event)"
    >
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img
            [src]="pelicula.imagen"
            [alt]="getLocalizedText(pelicula.titulo)"
            class="poster"
          />

          <div class="rating-badge">
            {{ pelicula.puntuacion }}/10
          </div>
        </div>

        <div class="flip-card-back">
          <div class="movie-info">
            <h2 class="movie-title" [innerHTML]="getLocalizedText(pelicula.titulo)"></h2>

            <p><strong>{{ t().movieDetail.director }}:</strong> {{ pelicula.director }}</p>
            <p><strong>{{ t().movieDetail.releaseYear }}:</strong> {{ pelicula.estreno }}</p>
            <p><strong>{{ t().movieDetail.rating }}:</strong> {{ pelicula.puntuacion }}/10</p>

            <p class="synopsis">
              {{ getLocalizedText(pelicula.sinopsis) }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
