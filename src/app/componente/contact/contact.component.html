<section class="info-page">
  <div class="info-page__container">
    <span class="info-page__eyebrow">{{ t().contact.eyebrow }}</span>
    <h1 class="info-page__title">{{ t().contact.title }}</h1>

    <div class="info-page__content">
      <p>{{ t().contact.intro }}</p>

      <div class="info-page__contact-list">
        <p><strong>{{ t().contact.email }}:</strong> contact@cinesdpr.com</p>
        <p><strong>{{ t().contact.business }}:</strong> partnerships@cinesdpr.com</p>
        <p><strong>{{ t().contact.location }}:</strong> {{ t().contact.city }}</p>
      </div>

      <p>{{ t().contact.outro }}</p>
    </div>
  </div>
</section>
