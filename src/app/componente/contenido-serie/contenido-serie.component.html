<div class="series-detail-page">
  <div *ngIf="serie" class="series-detail-card">
    <div class="series-detail-poster">
      <img [src]="serie.imagen" [alt]="getLocalizedText(serie.titulo)" />
    </div>

    <div class="series-detail-info">
      <span class="series-detail-tag">{{ t().seriesDetail.tag }}</span>

      <h1 class="series-detail-title" [innerHTML]="getLocalizedText(serie.titulo)"></h1>

      <div class="series-detail-meta">
        <p><strong>{{ t().seriesDetail.seasons }}:</strong> {{ serie.temporadas }}</p>
        <p><strong>{{ t().seriesDetail.platform }}:</strong> {{ getLocalizedText(serie.plataforma) }}</p>
      </div>

      <div class="series-detail-synopsis">
        <h2>{{ t().seriesDetail.synopsis }}</h2>
        <p>{{ getLocalizedText(serie.sinopsis) }}</p>
      </div>
    </div>
  </div>
</div>
